<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lyras Archiv</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📚%3C/text%3E%3C/svg%3E" />
    <meta
      name="description"
      content="Explorer-basiertes statisches Archiv für AI-Vorlagen und Recherchen mit Vollseiten-Artikelansicht."
    />
    <link rel="stylesheet" href="./assets/styles.css" />
    <script src="./data/archive.js"></script>
    <script src="./assets/app.js" defer></script>
    <script>
      // Update document title dynamically when archive loads
      document.addEventListener('DOMContentLoaded', () => {
        if (window.__LYRA_ARCHIVE_DATA__?.site?.title) {
          document.title = window.__LYRA_ARCHIVE_DATA__.site.title;
        }
      });
    </script>
  </head>
  <body>
    <main class="site-shell">
      <section class="home-view" data-home-view>
        <header class="hero">
          <p class="hero-kicker">LYRA ARCHIVE</p>
          <h1 data-site-title>Recherche-Archiv</h1>
          <p class="hero-tagline" data-site-tagline></p>
          <p class="hero-intro" data-site-intro></p>
          <div class="hero-meta">
            <span class="meta-pill" data-section-count>0 Rubriken</span>
            <span class="meta-pill" data-entry-count>0 Einträge</span>
            <span class="meta-pill" data-generated-at>Generiert: -</span>
          </div>
        </header>

        <section class="panel panel-ai">
          <div class="panel-headline">
            <h2>AI-Vorlagen</h2>
            <p data-ai-summary>Archivierte Prompts und Instructions.</p>
          </div>
          <div class="news-grid" data-ai-grid></div>
        </section>

        <section class="panel panel-projects">
          <div class="panel-headline">
            <h2>Lyras Projekte</h2>
          </div>
          <div class="news-grid" data-projects-grid></div>
        </section>

        <section class="panel panel-research">
          <div class="panel-headline">
            <h2>Recherchen Explorer</h2>
            <p>Ordner zuerst, Artikel darunter. Klick auf einen Ordner führt tiefer in den Tree.</p>
          </div>
          <div class="explorer-controls">
            <button type="button" class="ctrl-button" data-research-back>Zurück</button>
            <button type="button" class="ctrl-button primary" data-research-home>Startseite</button>
          </div>
          <nav class="breadcrumb" data-breadcrumb></nav>
          <p class="research-meta" data-research-meta></p>
          <div class="folder-grid" data-folder-grid></div>
          <div class="news-grid" data-research-article-grid></div>
        </section>
      </section>

      <section class="article-view" data-article-view hidden>
        <div class="article-shell">
          <header class="article-hero">
            <div class="article-nav">
              <button type="button" class="ctrl-button" data-article-back>Zurück</button>
              <button type="button" class="ctrl-button primary" data-article-home>Startseite</button>
            </div>
            <p class="article-kicker" data-article-kicker>Artikel</p>
            <h2 data-article-title>Eintrag</h2>
            <p class="article-meta" data-article-meta></p>
            <div class="article-actions">
              <button class="action-button primary" type="button" data-article-copy>Inhalt kopieren</button>
              <button class="action-button secondary" type="button" data-article-download>Original herunterladen</button>
              <button class="action-button secondary" type="button" data-article-share>Teillink kopieren</button>
              <button class="action-button secondary" type="button" data-article-web-play>Audio abspielen</button>
            </div>
            <p class="article-status" data-article-status></p>
          </header>
          <section class="article-content" data-article-content></section>
        </div>
      </section>
    </main>
    <footer class="site-footer">
      Letzte Generierung: <span data-footer-timestamp>-</span>
    </footer>
  </body>
</html>
