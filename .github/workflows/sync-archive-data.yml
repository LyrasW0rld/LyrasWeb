name: Sync Archive Data

on:
  push:
    branches:
      - main
    paths:
      - "AI/**"
      - "Recherchen/**"
      - "content.config.json"
      - "scripts/generate_archive.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Regenerate archive data
        run: python scripts/generate_archive.py

      - name: Commit regenerated files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/archive.json data/archive.js
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore: auto-sync archive data [skip ci]"
          git push
